name: Benchmark Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/benchmark-artifacts.yml"
      - "Directory.Build.props"
      - "HighPerformanceSocket.slnx"
      - "src/**"
      - "tests/**"
      - "samples/**"

permissions:
  contents: read

jobs:
  benchmark-artifacts:
    name: benchmark artifacts (windows)
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      HPS_BENCHMARK_RUNNER_ID: ci-windows-x64-01
      HPS_BENCHMARK_RUNNER_KIND: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore HighPerformanceSocket.slnx

      - name: Build
        run: dotnet build HighPerformanceSocket.slnx --no-restore

      - name: Test
        run: dotnet test HighPerformanceSocket.slnx --no-build --no-restore

      - name: Prepare benchmark artifact paths
        shell: pwsh
        run: |
          $dateRootName = Get-Date -Format "yyyy-MM-dd"
          $runnerRoot = "artifacts/benchmarks/runners/$env:HPS_BENCHMARK_RUNNER_ID"
          $dateRoot = "$runnerRoot/$dateRootName"
          $sessionDir = "$dateRoot/session-01"
          $artifactName = "benchmark-artifacts-$($env:HPS_BENCHMARK_RUNNER_ID)-$dateRootName-github-$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)"

          New-Item -ItemType Directory -Path $sessionDir -Force | Out-Null

          "BENCH_DATE_ROOT=$dateRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "BENCH_SESSION_DIR=$sessionDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "BENCH_ARTIFACT_NAME=$artifactName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run baseline suite
        shell: pwsh
        run: |
          dotnet run --project tests/Hps.Benchmarks/Hps.Benchmarks.csproj --no-build --no-restore -- --baseline-suite "$env:BENCH_SESSION_DIR" --runs 3
          $exitCode = $LASTEXITCODE
          "BENCH_BASELINE_EXIT=$exitCode" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          if ($exitCode -ne 0) {
            Write-Host "baseline suite exited with $exitCode; continuing to write analysis artifacts."
          }
          exit 0

      - name: Write baseline summary
        shell: pwsh
        run: |
          dotnet run --project tests/Hps.Benchmarks/Hps.Benchmarks.csproj --no-build --no-restore -- --summarize-baseline "$env:BENCH_SESSION_DIR" --summary "$env:BENCH_SESSION_DIR/summary.json" --summary-md "$env:BENCH_SESSION_DIR/summary.md"
          $exitCode = $LASTEXITCODE
          "BENCH_SUMMARY_EXIT=$exitCode" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          if ($exitCode -ne 0) {
            Write-Host "baseline summary exited with $exitCode; continuing to write remaining analysis artifacts."
          }
          exit 0

      - name: Write baseline history
        shell: pwsh
        run: |
          dotnet run --project tests/Hps.Benchmarks/Hps.Benchmarks.csproj --no-build --no-restore -- --summarize-baseline-history "$env:BENCH_DATE_ROOT" --history "$env:BENCH_DATE_ROOT/history.json" --history-md "$env:BENCH_DATE_ROOT/history.md"
          $exitCode = $LASTEXITCODE
          "BENCH_HISTORY_EXIT=$exitCode" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          if ($exitCode -ne 0) {
            Write-Host "baseline history exited with $exitCode; continuing to write remaining analysis artifacts."
          }
          exit 0

      - name: Write baseline envelope comparison
        shell: pwsh
        run: |
          $referenceHistory = "docs/benchmarks/baselines/runners/$env:HPS_BENCHMARK_RUNNER_ID/history.json"
          if (Test-Path $referenceHistory) {
            dotnet run --project tests/Hps.Benchmarks/Hps.Benchmarks.csproj --no-build --no-restore -- `
              --compare-baseline-envelope "$env:BENCH_SESSION_DIR/summary.json" `
              --reference-history "$referenceHistory" `
              --envelope "$env:BENCH_DATE_ROOT/envelope.json" `
              --envelope-md "$env:BENCH_DATE_ROOT/envelope.md"
            $exitCode = $LASTEXITCODE
            "BENCH_ENVELOPE_EXIT=$exitCode" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            if ($exitCode -ne 0) {
              Write-Host "baseline envelope comparison exited with $exitCode; continuing to upload artifacts."
            }
          }
          else {
            "BENCH_ENVELOPE_EXIT=0" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host "baseline envelope reference not found; skipping envelope comparison."
          }
          exit 0

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.BENCH_ARTIFACT_NAME }}
          path: ${{ env.BENCH_DATE_ROOT }}
          if-no-files-found: error
          retention-days: 14

      - name: Fail if benchmark hard gate failed
        if: always()
        shell: pwsh
        run: |
          $exitCodes = @(
            "$env:BENCH_BASELINE_EXIT",
            "$env:BENCH_SUMMARY_EXIT",
            "$env:BENCH_HISTORY_EXIT",
            "$env:BENCH_ENVELOPE_EXIT"
          )

          foreach ($exitCode in $exitCodes) {
            if ($exitCode -ne "0") {
              Write-Error "benchmark artifact generation completed with non-zero exit code; baseline=$env:BENCH_BASELINE_EXIT summary=$env:BENCH_SUMMARY_EXIT history=$env:BENCH_HISTORY_EXIT envelope=$env:BENCH_ENVELOPE_EXIT"
              exit 1
            }
          }

          Write-Host "benchmark artifact generation completed successfully."
